// ==========================================
// 3. Google 登入畫面 (使用最新的 Client ID)
// ==========================================
function AuthScreen(p){
    const [ld, setLd] = us(false);
    function doGoogleLogin() {
        setLd(true);
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/drive.file');
        firebase.auth().signInWithPopup(provider).then((result) => {
            window.GOOGLE_TOKEN = result.credential.accessToken;
            const u = result.user;
            p.go({uid: u.uid, name: u.displayName||'User', email: u.email, avatar: u.photoURL||'👤'});
        }).catch(e => { alert(e.message); setLd(false); });
    }
    return h("div",{className:"as"},
        h("div",{className:"al"}, h("div",{style:{fontSize:64,marginBottom:16}},"📬"), h("h1",{style:{fontFamily:"var(--fs)",fontWeight:900,fontSize:28,color:"var(--w)"}},"Somewhen")),
        h("div",{className:"atl"},"你的數位家書金庫"),
        h("div",{className:"asu"},"已串接 Google 雲端備份與 AES-256 加密。"),
        h("div",{style:{marginTop:36}}, h("button",{className:"sb",onClick:doGoogleLogin,disabled:ld}, ld?"安全連線中...":"🌐 使用 Google 帳號登入"))
    );
}
