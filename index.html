<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Somewhen | 數位家書金庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<style>
/* 這裡封存了你原本所有的精美 CSS 樣式 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#FBF7F2;--bg2:#FFFFFF;--t1:#2C2418;--t2:#6B5D4F;--ac:#C07050;--w:#8B6B4A;--r:18px;--fs:'Noto Serif TC',serif;--fn:'Noto Sans TC',sans-serif;--sh:0 2px 12px rgba(44,36,24,.06)}
body{background:var(--bg);color:var(--t1);font-family:var(--fn);overflow-x:hidden}
#R{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.S{padding:24px 20px 110px;animation:fu .3s ease-out}@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(251,247,242,.95);backdrop-filter:blur(10px);border-top:1px solid rgba(0,0,0,.05);display:flex;justify-content:space-around;padding:10px 0;z-index:100}
.nb button{background:none;border:none;color:#A09484;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px}
.nb button.a{color:var(--ac)}
.hd{text-align:center;padding:40px 0 20px}.hd h1{font-family:var(--fs);font-weight:900;font-size:28px;color:var(--w)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.cd{background:var(--bg2);border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--sh);cursor:pointer}
.cd .ic{font-size:32px;display:block;margin-bottom:8px}
.psec{background:var(--bg2);border-radius:var(--r);padding:30px 20px;text-align:center;box-shadow:var(--sh);margin-bottom:20px}
.pav{width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 15px;border:3px solid var(--ac)}
.pav img{width:100%;height:100%;object-fit:cover}
.sb{width:100%;padding:16px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="R"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-MjeKq4Q8JbMukMAivX-lKlr5nwNjJW0",
  authDomain: "somewhen-715f1.firebaseapp.com",
  projectId: "somewhen-715f1",
  storageBucket: "somewhen-715f1.firebasestorage.app",
  messagingSenderId: "612698305835",
  appId: "1:612698305835:web:53718a769d8b0e03a016e"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const h = React.createElement;
const F = React.Fragment;

function App() {
  const [user, setUser] = React.useState(() => JSON.parse(localStorage.getItem("tv-user")));
  const [view, setView] = React.useState("home");

  const login = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.file');
    firebase.auth().signInWithPopup(provider).then(res => {
      const u = { name: res.user.displayName, email: res.user.email, avatar: res.user.photoURL, uid: res.user.uid };
      localStorage.setItem("tv-user", JSON.stringify(u));
      setUser(u);
    });
  };

  if (!user) return h("div", { className: "S", style: { textAlign: "center", paddingTop: "100px" } }, 
    h("div", { style: { fontSize: "64px" } }, "📬"),
    h("h1", { style: { fontFamily: "var(--fs)", margin: "20px 0" } }, "Somewhen"),
    h("button", { className: "sb", onClick: login }, "使用 Google 帳號登入")
  );

  return h(F, null,
    view === "home" && h("div", { className: "S" },
      h("div", { className: "hd" }, h("div", { style: { fontSize: "40px" } }, "📬"), h("h1", null, "Somewhen"), h("p", null, "您的私人加密金庫")),
      h("div", { className: "tg" }, [
        { id: "money", icon: "💰", label: "金錢" },
        { id: "love", icon: "❤️", label: "愛" },
        { id: "msg", icon: "✍️", label: "留話" },
        { id: "box", icon: "🔒", label: "金庫" }
      ].map(item => h("div", { className: "cd" }, h("span", { className: "ic" }, item.icon), h("div", null, item.label))))
    ),
    view === "profile" && h("div", { className: "S" },
      h("div", { className: "psec" },
        h("div", { className: "pav" }, h("img", { src: user.avatar })),
        h("h2", null, user.name),
        h("p", { style: { color: "var(--t3)", fontSize: "12px" } }, user.email)
      ),
      h("button", { className: "sb", style: { background: "#eee", color: "#666" }, onClick: () => { localStorage.removeItem("tv-user"); setUser(null); } }, "登出")
    ),
    h("nav", { className: "nb" }, [
      { id: "home", i: "🏠", l: "首頁" },
      { id: "collection", i: "📚", l: "收藏" },
      { id: "profile", i: "👤", l: "我的" }
    ].map(n => h("button", { className: view === n.id ? "a" : "", onClick: () => setView(n.id) }, h("span", { style: { fontSize: "20px" } }, n.i), n.l)))
  );
}

ReactDOM.createRoot(document.getElementById("R")).render(h(App));
</script>
</body>
</html>
