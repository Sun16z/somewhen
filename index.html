<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FBF7F2">
<title>Somewhen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕯️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#FBF7F2;--bg2:#FFFFFF;--bg3:#F3EDE5;
--t1:#2C2418;--t2:#6B5D4F;--t3:#A09484;
--ac:#C07050;--acs:rgba(192,112,80,.1);--w:#8B6B4A;
--blue:#5B8FA8;--green:#5A9E6E;--r:18px;--rs:12px;
--fs:'Noto Serif TC',serif;--fn:'Noto Sans TC',sans-serif;
--sh:0 2px 12px rgba(44,36,24,.06)
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--fn);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#R{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.S{position:relative;padding:24px 20px 110px;animation:fu .35s ease-out}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* nav */
.nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(251,247,242,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(139,107,74,.1);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nb button{background:none;border:none;color:var(--t3);font-size:10px;font-family:var(--fn);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;-webkit-tap-highlight-color:transparent;transition:color .2s}
.nb button.a{color:var(--ac)}
.nb .ni{font-size:20px}
/* header */
.hd{text-align:center;padding:36px 0 20px}
.hd h1{font-family:var(--fs);font-weight:900;font-size:28px;letter-spacing:2px;color:var(--w)}
.hd p{color:var(--t2);font-size:13px;margin-top:6px;line-height:1.8;font-family:var(--fs)}
/* cards */
.cd{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent;box-shadow:var(--sh)}
.cd:active{transform:scale(.97);box-shadow:none}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.cd .ic{font-size:24px;display:block;margin-bottom:6px}
.cd .lb{font-family:var(--fs);font-weight:700;font-size:14px;margin-bottom:3px;color:var(--w)}
.cd .ds{font-size:11px;color:var(--t3);line-height:1.4}
.cb{position:absolute;top:10px;right:10px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
/* stats */
.sr{display:flex;gap:8px;margin:16px 0}
.sc{flex:1;background:var(--bg2);border:1px solid rgba(139,107,74,.06);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.sn{font-family:var(--fs);font-weight:900;font-size:24px;color:var(--ac)}
.sl{font-size:10px;color:var(--t3);margin-top:2px}
.st{font-family:var(--fs);font-weight:700;font-size:20px;margin-bottom:14px;color:var(--w)}
/* toast */
.toast{position:fixed;top:28px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--ac);color:var(--ac);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:ti .3s ease-out;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
/* form */
.rh{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.bb{background:var(--bg2);border:1px solid rgba(139,107,74,.1);color:var(--t1);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;box-shadow:var(--sh)}
.rt{font-family:var(--fs);font-weight:700;font-size:18px;color:var(--w)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:500}
.fi,.ft{width:100%;background:var(--bg2);border:1px solid rgba(139,107,74,.12);border-radius:var(--rs);color:var(--t1);font-family:var(--fn);font-size:16px;padding:12px 14px;outline:none;-webkit-appearance:none;box-shadow:var(--sh)}
.fi:focus,.ft:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(192,112,80,.1)}
.ft{min-height:140px;resize:vertical;line-height:1.7}
/* chips */
.cr{display:flex;flex-wrap:wrap;gap:6px}
.ch{background:var(--bg2);border:1px solid rgba(139,107,74,.1);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--t2);cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:var(--fn);box-shadow:var(--sh)}
.ch.s{background:var(--acs);border-color:var(--ac);color:var(--ac);font-weight:500}
/* trigger chips */
.trg{display:flex;flex-wrap:wrap;gap:8px}
.tc{padding:8px 14px;font-size:13px;background:var(--bg2);border:1px solid rgba(139,107,74,.1);border-radius:20px;color:var(--t2);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;line-height:1.4;font-family:var(--fn);box-shadow:var(--sh)}
.tc.s{background:var(--acs);border-color:var(--ac);color:var(--ac);font-weight:500;box-shadow:0 0 0 3px rgba(192,112,80,.08)}
.tc:active{transform:scale(.96)}
/* topic chips */
.ts{display:flex;flex-wrap:wrap;gap:6px}
.tp{background:var(--bg2);border:1px solid rgba(139,107,74,.1);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--t2);cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:var(--fn);box-shadow:var(--sh)}
.tp.s{background:var(--acs);border-color:var(--ac);color:var(--ac)}
/* submit */
.sb{width:100%;padding:15px;background:linear-gradient(135deg,var(--ac),#A05A3A);color:#FFF;font-family:var(--fs);font-weight:700;font-size:15px;border:none;border-radius:var(--r);cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(192,112,80,.2);-webkit-tap-highlight-color:transparent;letter-spacing:.5px}
.sb:disabled{opacity:.35;cursor:not-allowed}
/* mode toggle */
.mt{display:flex;margin-bottom:16px;border-radius:var(--rs);overflow:hidden;border:1px solid rgba(139,107,74,.1);box-shadow:var(--sh)}
.mb{flex:1;padding:11px 4px;background:var(--bg2);border:none;color:var(--t3);font-family:var(--fn);font-size:13px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mb.a{background:var(--acs);color:var(--ac);font-weight:600}
.mb.l{opacity:.4;cursor:not-allowed}
.mb:not(:last-child){border-right:1px solid rgba(139,107,74,.08)}
/* recorder */
.vp{background:var(--bg2);border:2px dashed rgba(139,107,74,.15);border-radius:var(--r);padding:36px 20px;text-align:center;color:var(--t3);cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:16px;box-shadow:var(--sh)}
.vr{border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:16px;box-shadow:var(--sh)}
.vl{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#000}
.vl.rc{box-shadow:inset 0 0 0 3px var(--ac)}
.vc{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;background:var(--bg2);flex-wrap:wrap}
.rb{display:flex;align-items:center;gap:6px;padding:10px 22px;background:var(--ac);color:#fff;border:none;border-radius:30px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(192,112,80,.25)}
.rd{width:8px;height:8px;border-radius:50%;background:#fff}
.rx{padding:9px 16px;background:transparent;border:1px solid rgba(139,107,74,.15);color:var(--t2);border-radius:30px;font-family:var(--fn);font-size:12px;cursor:pointer}
.rs2{padding:10px 22px;background:rgba(192,112,80,.08);border:1px solid rgba(192,112,80,.2);color:var(--ac);border-radius:30px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer}
.rtm{display:flex;align-items:center;gap:6px;color:var(--ac);font-size:16px;font-weight:700}
.rdp{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:pl 1.5s ease-in-out infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.ar{text-align:center;padding:32px;font-size:40px;background:var(--bg3);border-radius:var(--r)}
.arec{text-align:center;padding:28px;background:var(--bg3);border-radius:var(--r) var(--r) 0 0}
.aw{width:60px;height:60px;border-radius:50%;background:rgba(192,112,80,.1);margin:0 auto 12px;animation:ap 2s ease-in-out infinite}
@keyframes ap{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.25);opacity:.9}}
.rtl{font-size:28px;font-weight:700;color:var(--ac)}
/* guided */
.gt{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--rs);margin-bottom:16px;cursor:pointer;box-shadow:var(--sh)}
.gs{width:44px;height:24px;border-radius:12px;background:rgba(139,107,74,.15);position:relative;transition:background .2s;flex-shrink:0}
.gs.on{background:var(--ac)}
.gd{width:18px;height:18px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.gs.on .gd{transform:translateX(20px)}
.gsc{background:var(--bg2);border:1px solid rgba(192,112,80,.12);border-radius:var(--r);padding:22px 18px;margin-bottom:16px;box-shadow:var(--sh)}
.gpr{height:3px;background:rgba(139,107,74,.08);border-radius:2px;margin-bottom:12px;overflow:hidden}
.gpb{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.gph{font-size:11px;color:var(--ac);font-weight:600;margin-bottom:8px;letter-spacing:1px}
.gq{font-family:var(--fs);font-size:17px;font-weight:700;line-height:1.7;margin-bottom:16px;color:var(--w)}
/* library */
.lf{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.lf::-webkit-scrollbar{display:none}
.fc{white-space:nowrap;background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--t3);cursor:pointer;flex-shrink:0;font-family:var(--fn);box-shadow:var(--sh)}
.fc.a{background:var(--acs);border-color:var(--ac);color:var(--ac)}
.mc{background:var(--bg2);border:1px solid rgba(139,107,74,.06);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--sh)}
.mc:active{box-shadow:none;transform:scale(.99)}
.mct{display:flex;justify-content:space-between;margin-bottom:8px}
.mtp{font-size:12px;color:var(--ac);font-weight:500}
.md{font-size:10px;color:var(--t3)}
.mtl{font-family:var(--fs);font-weight:700;font-size:15px;margin-bottom:4px;line-height:1.4;color:var(--w)}
.mpv{font-size:12px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mf{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mg{font-size:10px;background:var(--bg3);color:var(--t3);padding:2px 8px;border-radius:10px}
/* player */
.pc{background:var(--bg2);border:1px solid rgba(139,107,74,.06);border-radius:var(--r);padding:24px 18px;margin-top:12px;box-shadow:var(--sh)}
.ptc{font-size:13px;color:var(--ac);font-weight:500;margin-bottom:10px}
.ptl{font-family:var(--fs);font-weight:900;font-size:22px;line-height:1.5;margin-bottom:6px;color:var(--w)}
.pm{font-size:11px;color:var(--t3);margin-bottom:20px}
.pb{font-size:16px;line-height:2;color:var(--t2);white-space:pre-wrap;font-family:var(--fs)}
.pr{display:flex;gap:6px;margin-top:20px;flex-wrap:wrap}
.pt{font-size:11px;background:var(--acs);color:var(--ac);padding:3px 10px;border-radius:10px}
.db{width:100%;padding:12px;background:transparent;border:1px solid rgba(200,90,90,.2);color:#B05050;font-family:var(--fn);font-size:13px;border-radius:var(--rs);cursor:pointer;margin-top:16px}
.shb{width:100%;padding:12px;background:var(--acs);border:1px solid rgba(192,112,80,.2);color:var(--ac);font-family:var(--fn);font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;margin-top:16px}
/* vault items */
.vi{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--rs);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.vi-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.vi-t{font-family:var(--fs);font-weight:700;font-size:14px;color:var(--w)}
.vi-c{font-size:11px;color:var(--t3);background:var(--bg3);padding:2px 8px;border-radius:8px}
.vi-b{font-size:13px;color:var(--t2);line-height:1.6}
.vi-d{display:flex;gap:8px;margin-top:8px}
.vi-db{font-size:11px;color:var(--ac);cursor:pointer;padding:4px 10px;border:1px solid rgba(192,112,80,.15);border-radius:8px;background:transparent}
/* contact matrix */
.cm{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--rs);padding:14px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:flex-start;gap:12px}
.cm-i{font-size:24px;flex-shrink:0;margin-top:2px}
.cm-q{font-size:13px;color:var(--t2);margin-bottom:4px;line-height:1.5}
.cm-a{font-family:var(--fs);font-weight:700;font-size:14px;color:var(--w)}
.cm-p{font-size:12px;color:var(--t3);margin-top:2px}
/* capsule */
.cap{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--rs);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.cap-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cap-t{font-family:var(--fs);font-weight:700;font-size:14px;color:var(--w)}
.cap-d{font-size:11px;color:var(--ac);background:var(--acs);padding:2px 10px;border-radius:10px;font-weight:500}
.cap-b{font-size:13px;color:var(--t2);line-height:1.5}
.cap-r{font-size:11px;color:var(--t3);margin-top:6px}
/* switch */
.dms{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.dms-h{font-family:var(--fs);font-weight:700;font-size:16px;color:var(--w);margin-bottom:8px}
.dms-p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px}
.dms-s{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg3);border-radius:var(--rs);margin-bottom:8px}
.dms-sl{font-size:13px;color:var(--t2)}
.dms-sv{font-size:13px;font-weight:600;color:var(--ac)}
/* empty */
.es{text-align:center;padding:48px 20px;color:var(--t3)}
/* auth */
.as{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 28px;animation:fu .5s ease-out;background:var(--bg)}
.al{text-align:center;margin-bottom:40px}
.atl{font-family:var(--fs);font-size:20px;font-weight:700;color:var(--w);text-align:center;margin-bottom:8px;line-height:1.6}
.asu{color:var(--t3);font-size:14px;text-align:center;margin-bottom:32px;line-height:1.7;font-family:var(--fs)}
.asb{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.ab{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:12px;font-family:var(--fn);font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;border:1px solid rgba(139,107,74,.12);box-shadow:var(--sh)}
.ab:active{transform:scale(.98)}
.ab.ap{background:var(--t1);color:#fff;border:none}
.ab.ag{background:var(--bg2);color:var(--t1)}
.adv{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.adl{flex:1;height:1px;background:rgba(139,107,74,.12)}
.adt{color:var(--t3);font-size:12px}
.ain{width:100%;background:var(--bg2);border:1px solid rgba(139,107,74,.12);border-radius:12px;color:var(--t1);font-family:var(--fn);font-size:16px;padding:14px 16px;outline:none;-webkit-appearance:none;box-shadow:var(--sh)}
.ain:focus{border-color:var(--ac)}
.ain::placeholder{color:var(--t3)}
.aer{background:rgba(176,80,80,.08);border:1px solid rgba(176,80,80,.15);border-radius:10px;padding:10px 14px;font-size:13px;color:#B05050;text-align:center;margin-bottom:16px}
.aft{text-align:center;margin-top:24px;font-size:13px;color:var(--t3)}
.alk{color:var(--ac);cursor:pointer;font-weight:500}
.atm{text-align:center;margin-top:28px;font-size:11px;color:var(--t3);line-height:1.6}
.atm a{color:var(--t2)}
.odd{display:flex;justify-content:center;gap:8px;margin-top:28px}
.od{width:8px;height:8px;border-radius:50%;background:rgba(139,107,74,.15);transition:all .3s;cursor:pointer}
.od.a{background:var(--ac);width:24px;border-radius:4px}
/* pricing */
.pcd{background:var(--bg2);border:1px solid rgba(139,107,74,.08);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--sh)}
.pcd.hl{border-color:var(--ac);box-shadow:0 0 20px rgba(192,112,80,.08)}
.pcd.cu{border-color:var(--green)}
.pn{font-family:var(--fs);font-weight:700;font-size:18px;color:var(--w)}
.pp{font-size:16px;font-weight:700;color:var(--ac)}
.pf{list-style:none;margin-bottom:16px}
.pf li{font-size:13px;color:var(--t2);padding:4px 0}
.pcta{width:100%;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer}
.pcta.cu{background:rgba(90,158,110,.1);color:var(--green);cursor:default}
/* profile */
.psec{background:var(--bg2);border:1px solid rgba(139,107,74,.06);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--sh)}
.pav{width:64px;height:64px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;border:2px solid var(--ac)}
.pnm{font-family:var(--fs);font-weight:700;font-size:20px;text-align:center;color:var(--w);margin-bottom:4px}
.pem{font-size:13px;color:var(--t3);text-align:center;margin-bottom:16px}
.pmi{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(139,107,74,.06);cursor:pointer}
.pmi:last-child{border-bottom:none}
.lob{width:100%;padding:14px;background:transparent;border:1px solid rgba(176,80,80,.2);color:#B05050;font-family:var(--fn);font-size:14px;border-radius:var(--rs);cursor:pointer}
.tbg{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;letter-spacing:1px}
/* section tabs */
.stb{display:flex;gap:0;border-radius:var(--rs);overflow:hidden;border:1px solid rgba(139,107,74,.1);margin-bottom:16px;box-shadow:var(--sh)}
.stb button{flex:1;padding:10px;background:var(--bg2);border:none;color:var(--t3);font-family:var(--fn);font-size:12px;font-weight:500;cursor:pointer}
.stb button.a{background:var(--acs);color:var(--ac);font-weight:600}
.stb button:not(:last-child){border-right:1px solid rgba(139,107,74,.08)}
</style>
</head>
<body>
<div id="R"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script>
if(typeof React==="undefined"){document.getElementById("R").innerHTML="<p style='padding:40px;text-align:center;color:#C07050;font-size:16px'>載入中，請稍候…若持續空白請重新整理</p>"}
</script>
<script>
try{
"use strict";

function getUpcomingEvents(data){
var now=new Date();var y=now.getFullYear();var m=now.getMonth()+1;var d=now.getDate();
var events=[];
// Fixed holidays - find next 3 upcoming
FIXED_HOLIDAYS.forEach(function(h){
var daysAway;
var hDate=new Date(y,h.m-1,h.d);
if(hDate<now)hDate=new Date(y+1,h.m-1,h.d);
daysAway=Math.ceil((hDate-now)/(1000*60*60*24));
if(daysAway<=60)events.push({type:"holiday",name:h.name,icon:h.icon,prompt:h.prompt,date:hDate.toISOString().slice(0,10),daysAway:daysAway})
});
// Family birthdays
if(data.family)data.family.forEach(function(f){
if(!f.birthday)return;
var parts=f.birthday.split("-");var bm=parseInt(parts[1]);var bd=parseInt(parts[2]);
var bDate=new Date(y,bm-1,bd);
if(bDate<now)bDate=new Date(y+1,bm-1,bd);
var daysAway=Math.ceil((bDate-now)/(1000*60*60*24));
var age=bDate.getFullYear()-parseInt(parts[0]);
if(daysAway<=60)events.push({type:"birthday",name:(f.nickname||f.name)+" "+age+" 歲生日",icon:"🎂",prompt:"錄一段生日祝福給"+(f.nickname||f.name)+"！",date:bDate.toISOString().slice(0,10),daysAway:daysAway,person:f.nickname||f.name})
});
// Custom dates
if(data.dates)data.dates.forEach(function(dt){
var parts=dt.date.split("-");var dm=parseInt(parts[1]);var dd=parseInt(parts[2]);
var dDate=new Date(y,dm-1,dd);
if(dDate<now)dDate=new Date(y+1,dm-1,dd);
var daysAway=Math.ceil((dDate-now)/(1000*60*60*24));
if(daysAway<=60)events.push({type:"custom",name:dt.name,icon:dt.icon||"📅",prompt:dt.prompt||"為這個特別的日子錄一段話",date:dDate.toISOString().slice(0,10),daysAway:daysAway})
});
events.sort(function(a,b){return a.daysAway-b.daysAway});
return events.slice(0,5)
}

// Monthly challenge
function getMonthlyChallenge(data){
var now=new Date();var month=now.getFullYear()*12+now.getMonth();
var msgsThisMonth=data.msgs.filter(function(m){var d=new Date(m.createdAt);return d.getFullYear()*12+d.getMonth()===month}).length;
return{month:now.getMonth()+1,count:msgsThisMonth,goal:1,done:msgsThisMonth>=1}
}

}).catch(function(err){

})
}
